name: Chelyabinsk News Agent

on:
  schedule:
    # Каждые 6 часов (минимум — 1 час: '0 * * * *')
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Причина ручного запуска (необязательно)'
        required: false
        default: 'manual trigger'

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --global user.email "research-agent@content-factory.local"
          git config --global user.name "Research Agent"

      - name: Install dependencies
        run: pip install ddgs requests trafilatura htmldate

      - name: Run Chelyabinsk research
        run: python3 researcher.py --config research_configs/chelyabinsk.json
        env:
          GEMINI_KEY:   ${{ secrets.GEMINI_KEY }}
          GROQ_KEY:     ${{ secrets.GROQ_KEY }}
          MISTRAL_KEY:  ${{ secrets.MISTRAL_KEY }}
          CEREBRAS_KEY: ${{ secrets.CEREBRAS_KEY }}

      - name: Commit changes
        run: |
          git add -A
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "📰 Chelyabinsk research update - $(date +'%Y-%m-%d %H:%M:%S')" && \
            git push origin main || git push origin $(git rev-parse --abbrev-ref HEAD)
          )
        continue-on-error: true

      - name: Summary
        run: |
          if [ -f docs/chelyabinsk/insights/index.json ]; then
            python3 -c "
            import json
            with open('docs/chelyabinsk/insights/index.json') as f:
              data = json.load(f)
              print(f'Total insights: {data.get(\"total_insights\", 0)}')
              print(f'Last updated: {data.get(\"last_updated\", \"N/A\")}')
            "
          fi
